<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<meta name="description" content="{{META_DESCRIPTION}}">
<link rel="canonical" href="{{CANONICAL_URL}}">
<!-- Open Graph -->
<meta property="og:title" content="{{OG_TITLE}}">
<meta property="og:description" content="{{OG_DESCRIPTION}}">
<meta property="og:image" content="{{OG_IMAGE}}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{CANONICAL_URL}}">
<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{OG_TITLE}}">
<meta name="twitter:description" content="{{OG_DESCRIPTION}}">
<meta name="twitter:image" content="{{OG_IMAGE}}">
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-alt: #f8f9fb;
    --surface: #ffffff;
    --surface-2: #f1f3f7;
    --surface-3: #e8ebf0;
    --border: #e2e5ec;
    --border-light: #eef0f4;
    --text: #1a1f2e;
    --text-muted: #4a5168;
    --text-dim: #7a8198;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --accent-light: rgba(37, 99, 235, 0.08);
    --green: #16a34a;
    --green-bg: rgba(22, 163, 74, 0.06);
    --purple: #7c3aed;
    --purple-bg: rgba(124, 58, 237, 0.06);
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
    --radius: 12px;
    --radius-sm: 8px;
    --max-w: 760px;
    --max-w-wide: 1100px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Article Container ── */
  .page-content {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── Hero Section ── */
  .hero {
    max-width: var(--max-w-wide);
    margin: 0 auto;
    padding: 60px 24px 48px;
    text-align: center;
  }
  .hero h1 {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .hero-sub {
    font-size: 18px;
    color: var(--text-muted);
    max-width: 600px;
    margin: 0 auto 24px;
    line-height: 1.6;
  }
  .hero-image {
    max-width: 100%;
    border-radius: var(--radius);
    margin-top: 32px;
  }

  /* ── CTA Buttons ── */
  .cta-primary {
    display: inline-block;
    padding: 14px 32px;
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    border-radius: var(--radius-sm);
    text-decoration: none;
    transition: background 0.15s, transform 0.1s;
  }
  .cta-primary:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
  }

  /* ── Trust Bar ── */
  .trust-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
    padding: 20px 24px;
    background: var(--bg-alt);
    border-top: 1px solid var(--border-light);
    border-bottom: 1px solid var(--border-light);
    margin-bottom: 48px;
  }
  .trust-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
  }

  /* ── Key Takeaways ── */
  .key-takeaways {
    background: var(--accent-light);
    border: 1px solid rgba(37, 99, 235, 0.15);
    border-left: 4px solid var(--accent);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 24px 28px;
    margin-bottom: 40px;
  }
  .key-takeaways h2 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }
  .key-takeaways ul {
    list-style: none;
    padding: 0;
  }
  .key-takeaways li {
    position: relative;
    padding-left: 20px;
    margin-bottom: 6px;
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
  }
  .key-takeaways li::before {
    content: '\2713';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }

  /* ── Headings ── */
  h2 {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.3;
    margin: 48px 0 16px;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  h3 {
    font-size: 20px;
    font-weight: 600;
    line-height: 1.4;
    margin: 32px 0 12px;
    color: var(--text);
  }

  /* ── Paragraphs ── */
  p {
    margin-bottom: 16px;
    color: var(--text);
  }
  .answer-first {
    font-size: 17px;
    line-height: 1.7;
    color: var(--text);
  }

  /* ── Citation Capsule ── */
  blockquote.citation-capsule {
    border-left: 3px solid var(--purple);
    background: var(--purple-bg);
    padding: 16px 20px;
    margin: 24px 0;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
  }

  /* ── Images ── */
  figure.content-image {
    margin: 32px 0;
  }
  figure.content-image img {
    max-width: 100%;
    height: auto;
    border-radius: var(--radius-sm);
    display: block;
  }
  figcaption {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 8px;
    text-align: center;
  }

  /* ── Tables ── */
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-size: 14px;
  }
  th {
    background: var(--bg-alt);
    font-weight: 600;
    text-align: left;
    padding: 12px 16px;
    border-bottom: 2px solid var(--border);
    color: var(--text);
  }
  td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-light);
    color: var(--text-muted);
  }
  tr:last-child td { border-bottom: none; }

  /* ── Tool Placeholder ── */
  .tool-placeholder {
    background: var(--surface-2);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    margin: 24px 0;
  }

  /* ── FAQ Accordion ── */
  .faq-section details {
    border: 1px solid var(--border-light);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    overflow: hidden;
  }
  .faq-section summary {
    padding: 16px 20px;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    background: var(--bg-alt);
    color: var(--text);
    list-style: none;
  }
  .faq-section summary::-webkit-details-marker { display: none; }
  .faq-section summary::before {
    content: '+';
    display: inline-block;
    width: 20px;
    font-weight: 700;
    color: var(--accent);
  }
  .faq-section details[open] summary::before { content: '\2212'; }
  .faq-section details > p,
  .faq-section details > div {
    padding: 16px 20px;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-muted);
  }

  /* ── CTA Section ── */
  .cta-section {
    background: var(--bg-alt);
    border-radius: var(--radius);
    padding: 40px;
    text-align: center;
    margin: 48px 0;
  }
  .cta-section h2 {
    margin-top: 0;
    font-size: 24px;
  }
  .cta-section p {
    max-width: 500px;
    margin: 0 auto 20px;
    color: var(--text-muted);
  }

  /* ── Related Content / Internal Links ── */
  .related-content {
    background: var(--bg-alt);
    border-radius: var(--radius);
    padding: 28px;
    margin: 40px 0;
  }
  .related-content h2 {
    font-size: 18px;
    margin: 0 0 16px;
  }
  .related-content ul {
    list-style: none;
    padding: 0;
  }
  .related-content li {
    margin-bottom: 8px;
  }
  .related-content a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }
  .related-content a:hover {
    text-decoration: underline;
  }

  /* ── Social Proof ── */
  .social-proof {
    padding: 40px 0;
    border-top: 1px solid var(--border-light);
    border-bottom: 1px solid var(--border-light);
    margin: 40px 0;
  }
  .testimonial {
    background: var(--bg-alt);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    font-style: italic;
    color: var(--text-muted);
  }
  .testimonial-author {
    font-style: normal;
    font-weight: 600;
    color: var(--text);
    margin-top: 8px;
    font-size: 14px;
  }

  /* ── Inline Links ── */
  a {
    color: var(--accent);
    text-decoration: none;
  }
  a:hover { text-decoration: underline; }

  /* ── Lists ── */
  ul, ol {
    padding-left: 24px;
    margin-bottom: 16px;
  }
  li {
    margin-bottom: 4px;
  }

  /* ── Source Citations ── */
  .source-cite {
    font-size: 14px;
    color: var(--text-dim);
  }
  .source-cite a { color: var(--text-dim); text-decoration: underline; }

  /* ── Footer ── */
  .page-footer {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 24px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    .hero { padding: 40px 16px 32px; }
    .hero h1 { font-size: 26px; }
    .trust-bar { gap: 16px; flex-direction: column; align-items: center; }
    .page-content { padding: 0 16px 60px; }
    h2 { font-size: 22px; }
    .cta-section { padding: 28px 20px; }
  }

  /* ── Print ── */
  @media print {
    body { font-size: 12px; line-height: 1.5; }
    .hero { padding: 20px 0; }
    .cta-primary, .cta-section { display: none; }
    .trust-bar { border: 1px solid #ccc; }
    a { color: #000; text-decoration: underline; }
    a::after { content: ' (' attr(href) ')'; font-size: 10px; }
  }
</style>
<!-- {{SCHEMA_JSON_LD}} -->
</head>
<body>

  <!-- ═══════════ HERO ═══════════ -->
  <section class="hero">
    <h1>{{H1}}</h1>
    <p class="hero-sub">{{HERO_SUBHEADLINE}}</p>
    <a href="#{{CTA_TARGET}}" class="cta-primary">{{CTA_TEXT}}</a>
  </section>

  <!-- ═══════════ TRUST ═══════════ -->
  <div class="trust-bar">
    <!-- {{TRUST_ITEMS}} -->
    <div class="trust-item">{{TRUST_TEXT}}</div>
    <!-- {{/TRUST_ITEMS}} -->
  </div>

  <!-- ═══════════ CONTENT ═══════════ -->
  <article class="page-content">

    <!-- {{KEY_TAKEAWAYS}} -->
    <div class="key-takeaways">
      <h2>Key Takeaways</h2>
      <ul>
        <li>{{TAKEAWAY}}</li>
      </ul>
    </div>
    <!-- {{/KEY_TAKEAWAYS}} -->

    <!-- {{CONTENT_SECTIONS}} -->
    <!-- Hier werden H2-Sektionen, Bilder, Tabellen, Citation Capsules generiert -->
    <!-- {{/CONTENT_SECTIONS}} -->

    <!-- {{FAQ_SECTION}} -->
    <section class="faq-section">
      <h2>{{FAQ_HEADING}}</h2>
      <details>
        <summary>{{FAQ_QUESTION}}</summary>
        <p>{{FAQ_ANSWER}}</p>
      </details>
    </section>
    <!-- {{/FAQ_SECTION}} -->

    <!-- {{CTA_SECTION}} -->
    <section class="cta-section">
      <h2>{{CTA_HEADING}}</h2>
      <p>{{CTA_DESCRIPTION}}</p>
      <a href="#{{CTA_TARGET}}" class="cta-primary">{{CTA_TEXT}}</a>
    </section>
    <!-- {{/CTA_SECTION}} -->

    <!-- {{RELATED_CONTENT}} -->
    <section class="related-content">
      <h2>Weiterfuehrende Inhalte</h2>
      <ul>
        <li><a href="{{LINK_URL}}">{{LINK_TEXT}}</a></li>
      </ul>
    </section>
    <!-- {{/RELATED_CONTENT}} -->

  </article>

  <footer class="page-footer">
    Erstellt mit Claude Code &middot; SXO-Page Skill &middot; {{DATUM}}
  </footer>

</body>
</html>
